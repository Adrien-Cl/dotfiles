

# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

autogenerated = 0

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher

# — Moniteur (généré par nwg-displays, fallback auto pour écrans inconnus) —
source = ~/.config/hypr/monitors.conf
monitor = ,preferred,auto,auto

xwayland {
    force_zero_scaling = true
}

# — Variables d'environnement Wayland —
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

exec-once = hyprlock
exec-once = hyprpaper
exec-once = bash -c "sleep 3 && hyprctl hyprpaper wallpaper 'eDP-1,/home/adrien/.config/hypr/wallpapers/ToriPixel.png'"
exec-once = quickshell
exec-once = [workspace 9 silent] vesktop
exec-once = dbus-update-activation-environment --systemd --all
exec-once = /usr/lib/kdeconnectd
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

layerrule {
    name = quickshell-blur
    match:namespace = ^quickshell$
    blur = true
    ignore_alpha = 0.5
}

# — Général —
general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 1
    col.active_border   = rgba(C8D1E9ff)
    col.inactive_border = rgba(01010Fcc)
    layout = dwindle
    resize_on_border = true
}

# — Décoration —
decoration {
    rounding         = 8
    active_opacity   = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(00000066)
    }

    blur {
        enabled          = true
        size             = 10
        passes           = 2
        new_optimizations = true
        ignore_opacity   = false
    }
}

# — Animations —
animations {
    enabled = true
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    animation = windows,    1, 5, smooth, slide
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border,     1, 8, default
    animation = fade,       1, 6, default
    animation = workspaces, 1, 5, smooth, slide
}

# — Clavier & souris —
input {
    kb_layout  = us
    kb_variant = intl
    kb_options =
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        drag_lock            = true
        disable_while_typing = true
    }
}

# — Gestes touchpad —
gestures {
    workspace_swipe_invert       = false
    workspace_swipe_distance     = 250
    workspace_swipe_cancel_ratio = 0.3
    workspace_swipe_forever      = false

    gesture = 3, horizontal, workspace
    gesture = 3, up,         dispatcher, exec, rofi -show drun
    gesture = 3, down,       special
    gesture = 4, up,         fullscreen
}

# — Layout dwindle —
dwindle {
    preserve_split = true
    force_split = 2
}

# — Divers —
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    focus_on_activate        = false
}

# — Règles fenêtres —
windowrule = workspace 1 silent brave
windowrule = workspace 2 silent VSCodium
windowrule = workspace 3 silent kitty
windowrule = workspace 9 silent vesktop
windowrule = float rofi
windowrule = float pavucontrol
windowrule = float blueman-manager
windowrule = float nm-connection-editor
windowrule = float nwg-look
# windowrule = noinitialfocus class:steam  # désactivé : règle renommée en 0.55

# — Apps —
bind = $mainMod,       Q,      exec,          $terminal
bind = $mainMod,       E,      exec,          $fileManager
bind = $mainMod,       R,      exec,          rofi -show drun
bind = $mainMod,       I,      exec,          quickshell ipc call bar toggleSettings
bind = $mainMod,       L,      exec,          hyprlock
bind = $mainMod,       C,                     killactive,
bind = $mainMod,       V,                     togglefloating,
bind = $mainMod,       F,                     fullscreen,    0
bind = $mainMod,       P,                     pin,
bind = $mainMod ALT,   C,                     centerwindow,
bind = $mainMod,       J,                     layoutmsg,    togglesplit
bind = $mainMod,       M,      exec,          command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# — Cycle fenêtres (ALT + TAB) —
bind = ALT,       Tab, cyclenext,
bind = ALT SHIFT, Tab, cyclenext,    prev

# — Focus fenêtre (SUPER + flèches) —
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# — Déplacer fenêtre (SUPER + SHIFT + flèches) —
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# — Redimensionner fenêtre (SUPER + ALT + flèches) —
binde = $mainMod ALT, left,  resizeactive, -40 0
binde = $mainMod ALT, right, resizeactive,  40 0
binde = $mainMod ALT, up,    resizeactive,  0 -40
binde = $mainMod ALT, down,  resizeactive,  0  40

# — Workspace précédent/suivant (SUPER + PageUp/PageDown) —
bind = $mainMod, Prior, workspace, e-1
bind = $mainMod, Next,  workspace, e+1

# — Changer de workspace (SUPER + 1-9) —
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# — Déplacer appli vers workspace (SUPER + SHIFT + 1-9) —
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# — Déplacer appli silencieusement (SUPER + CTRL + 1-9) —
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9

# — Scratchpad —
bind = $mainMod,       S, togglespecialworkspace,
bind = $mainMod SHIFT, S, movetoworkspace,        special

# — Workspace suivant/précédent (SUPER + molette ou TAB) —
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1
bind = $mainMod,       Tab,  workspace, e+1
bind = $mainMod SHIFT, Tab,  workspace, e-1

# — Déplacer fenêtre flottante à la souris —
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# — Volume (touches média) —
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# — Luminosité (touches média) —
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# — Screenshot (grim + slurp + wl-clipboard requis) —
bind = , Print,             exec, grim - | wl-copy
bind = $mainMod, Print,     exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png

# — Média (touches média) —
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

# — Presse-papier (cliphist + rofi) —
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
