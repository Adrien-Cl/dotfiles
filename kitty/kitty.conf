# ── Font ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10

# ── Colors ────────────────────────────────────────────────────────────────────
background            #01010F
foreground            #C8D1E9
cursor                #DDAC26
cursor_text_color     #01010F
selection_background  #C8D1E9
selection_foreground  #01010F

# Black
color0  #01010F
color8  #2A2A4A

# Red
color1  #F96565
color9  #F96565

# Green
color2  #5AF78E
color10 #5AF78E

# Yellow
color3  #DDAC26
color11 #DDAC26

# Blue
color4  #578EC7
color12 #7AAEDD

# Magenta
color5  #B48EAD
color13 #C8A8C8

# Cyan
color6  #88C0D0
color14 #8FBCBB

# White
color7  #C8D1E9
color15 #ECEFF4

# ── Background blur & opacity ─────────────────────────────────────────────────
background_opacity 0.85
background_blur    1

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width    12
hide_window_decorations yes
confirm_os_window_close 0

# ── Tab bar ───────────────────────────────────────────────────────────────────
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_background      none
active_tab_background   #DDAC26
active_tab_foreground   #01010F
inactive_tab_background #01010F
inactive_tab_foreground #C8D1E9

# ── Misc ──────────────────────────────────────────────────────────────────────
enable_audio_bell no
shell             fish
